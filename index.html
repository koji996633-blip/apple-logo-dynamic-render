<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Logo · 动态渲染</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --text: #f5f5f7;
      --muted: #86868b;
      --accent: #2997ff;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(1.25rem, 4vw, 2.5rem);
      z-index: 2;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      transition: color 0.4s ease;
    }

    .status.active { color: var(--accent); }

    footer {
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--muted);
      font-weight: 400;
      opacity: 0;
      animation: fadeUp 1s ease 0.85s forwards;
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: #48484a;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hidden SVG for path sampling */
    .svg-source { position: absolute; width: 0; height: 0; overflow: hidden; }
  </style>
</head>
<body>
  <svg class="svg-source" aria-hidden="true">
    <defs>
      <path id="apple-path" d="
        M 213.6 372.4
        c -8.4 12.6 -17.2 24.8 -30.6 25.0
        c -13.4 0.3 -17.7 -8.0 -32.9 -8.0
        c -15.3 0 -20.0 7.8 -32.7 8.3
        c -13.1 0.5 -23.0 -13.4 -31.4 -25.7
        C 50.5 325.6 37.4 279.0 55.0 247.5
        c 8.7 -15.4 24.3 -25.1 41.2 -25.4
        c 12.8 -0.2 25.0 8.8 32.9 8.8
        c 7.8 0 22.6 -10.7 38.1 -9.1
        c 6.5 0.3 24.7 2.6 36.4 20.1
        c -0.9 0.6 -21.7 12.8 -21.5 38.1
        c 0.3 30.2 26.5 40.3 26.8 40.4
        c -0.3 0.7 -4.2 14.4 -13.8 28.3
        M 145.0 67.0
        c 7.3 -8.3 19.4 -14.6 29.4 -15.0
        c 1.3 11.7 -3.4 23.5 -10.4 31.9
        c -6.9 8.5 -18.3 15.1 -29.5 14.2
        c -1.5 -11.5 4.1 -23.5 10.5 -31.1
        z
      " />
    </defs>
  </svg>

  <canvas id="canvas"></canvas>
  <div class="vignette"></div>

  <div class="overlay">
    <header>
      <span class="brand">Dynamic Render</span>
      <span class="status" id="status">初始化…</span>
    </header>
    <footer>
      <h1>Apple</h1>
      <p class="subtitle">Canvas 粒子动态渲染</p>
      <p class="hint">移动鼠标扰动粒子 · 点击重新组装</p>
    </footer>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    const PATH_SCALE = 0.52;
    const PARTICLE_COUNT = 4200;
    const SAMPLE_STEP = 3;
    const ASSEMBLE_DURATION = 2200;
    const MOUSE_RADIUS = 140;
    const MOUSE_FORCE = 0.35;

    let width, height, cx, cy;
    let particles = [];
    let targets = [];
    let mouse = { x: -9999, y: -9999, active: false };
    let startTime = 0;
    let phase = 'assemble'; // assemble | idle | burst
    let burstStart = 0;
    let frameId = 0;
    let glowPhase = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = width / 2;
      cy = height / 2;
      initTargets();
      resetParticles(false);
    }

    function getAppleBounds() {
      const pathEl = document.getElementById('apple-path');
      const len = pathEl.getTotalLength();
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let i = 0; i <= len; i += len / 200) {
        const p = pathEl.getPointAtLength(i);
        minX = Math.min(minX, p.x);
        minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x);
        maxY = Math.max(maxY, p.y);
      }
      const pw = maxX - minX;
      const ph = maxY - minY;
      const scale = (Math.min(width, height) * PATH_SCALE) / Math.max(pw, ph);
      const offX = cx - ((minX + maxX) / 2) * scale;
      const offY = cy - ((minY + maxY) / 2) * scale;
      return { pathEl, scale, offX, offY, minX, minY, maxX, maxY };
    }

    function initTargets() {
      const { pathEl, scale, offX, offY } = getAppleBounds();
      const offscreen = document.createElement('canvas');
      const size = Math.ceil(Math.max(width, height) * PATH_SCALE * 1.2);
      offscreen.width = size;
      offscreen.height = size;
      const octx = offscreen.getContext('2d');

      octx.translate(offX - cx + size / 2, offY - cy + size / 2);
      octx.scale(scale, scale);
      const path2d = new Path2D(pathEl.getAttribute('d'));
      octx.fillStyle = '#fff';
      octx.fill(path2d);

      const img = octx.getImageData(0, 0, size, size);
      const pts = [];
      const ox = offX - cx + size / 2;
      const oy = offY - cy + size / 2;

      for (let y = 0; y < size; y += SAMPLE_STEP) {
        for (let x = 0; x < size; x += SAMPLE_STEP) {
          const i = (y * size + x) * 4;
          if (img.data[i + 3] > 128) {
            pts.push({ x: x - size / 2 + cx, y: y - size / 2 + cy });
          }
        }
      }

      targets = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = pts[Math.floor(Math.random() * pts.length)] || { x: cx, y: cy };
        const jitter = (Math.random() - 0.5) * 2.5;
        targets.push({ x: p.x + jitter, y: p.y + jitter });
      }
    }

    function randomSpawn() {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.max(width, height) * (0.4 + Math.random() * 0.6);
      return {
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist
      };
    }

    function resetParticles(animate = true) {
      particles = targets.map((t, i) => {
        const spawn = randomSpawn();
        return {
          x: animate ? spawn.x : t.x,
          y: animate ? spawn.y : t.y,
          vx: 0,
          vy: 0,
          tx: t.x,
          ty: t.y,
          size: 0.8 + Math.random() * 1.4,
          brightness: 0.6 + Math.random() * 0.4,
          delay: Math.random() * 400
        };
      });
      startTime = performance.now();
      phase = 'assemble';
      statusEl.textContent = '组装中…';
      statusEl.classList.add('active');
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutQuart(t) {
      return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
    }

    function updateParticles(now) {
      const elapsed = now - startTime;

      if (phase === 'assemble') {
        const t = Math.min(1, elapsed / ASSEMBLE_DURATION);
        const eased = easeOutCubic(t);

        particles.forEach((p) => {
          const localT = Math.min(1, Math.max(0, (elapsed - p.delay) / (ASSEMBLE_DURATION - p.delay)));
          const e = easeOutCubic(localT);
          p.x += (p.tx - p.x) * e * 0.12;
          p.y += (p.ty - p.y) * e * 0.12;

          if (localT < 1) {
            const drift = (1 - localT) * 0.8;
            p.vx += (Math.random() - 0.5) * drift;
            p.vy += (Math.random() - 0.5) * drift;
          }
        });

        if (t >= 1) {
          phase = 'idle';
          statusEl.textContent = '渲染完成';
          statusEl.classList.remove('active');
        }
      }

      if (phase === 'burst') {
        const bt = (now - burstStart) / 1200;
        particles.forEach((p) => {
          const dx = p.x - cx;
          const dy = p.y - cy;
          const dist = Math.hypot(dx, dy) || 1;
          p.vx += (dx / dist) * 2.5;
          p.vy += (dy / dist) * 2.5;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.96;
          p.vy *= 0.96;
        });
        if (bt >= 1) resetParticles(true);
      }

      if (phase === 'idle') {
        glowPhase += 0.016;
        particles.forEach((p, i) => {
          const breathe = Math.sin(glowPhase + i * 0.02) * 0.4;
          p.x += (p.tx - p.x) * 0.08 + breathe * 0.02;
          p.y += (p.ty - p.y) * 0.08 + breathe * 0.02;

          if (mouse.active) {
            const dx = p.x - mouse.x;
            const dy = p.y - mouse.y;
            const dist = Math.hypot(dx, dy);
            if (dist < MOUSE_RADIUS && dist > 0) {
              const force = (1 - dist / MOUSE_RADIUS) * MOUSE_FORCE;
              p.vx += (dx / dist) * force * 8;
              p.vy += (dy / dist) * force * 8;
            }
          }

          p.vx += (p.tx - p.x) * 0.02;
          p.vy += (p.ty - p.y) * 0.02;
          p.vx *= 0.88;
          p.vy *= 0.88;
          p.x += p.vx;
          p.y += p.vy;
        });
      }
    }

    function drawBackground() {
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(width, height) * 0.7);
      grad.addColorStop(0, '#0a0a0c');
      grad.addColorStop(0.5, '#000000');
      grad.addColorStop(1, '#000000');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      const grid = 60;
      const offX = (performance.now() * 0.01) % grid;
      for (let x = -grid + offX; x < width + grid; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 0; y < height; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
    }

    function drawParticles(now) {
      const assembleProgress = phase === 'assemble'
        ? Math.min(1, (now - startTime) / ASSEMBLE_DURATION)
        : 1;

      const baseAlpha = 0.55 + assembleProgress * 0.4;
      const glow = phase === 'idle' ? 0.15 + Math.sin(glowPhase * 2) * 0.08 : 0;

      particles.forEach((p) => {
        const distToTarget = Math.hypot(p.x - p.tx, p.y - p.ty);
        const sharpness = Math.max(0, 1 - distToTarget / 80);
        const alpha = baseAlpha * p.brightness * (0.4 + sharpness * 0.6);
        const r = p.size * (0.7 + sharpness * 0.5);

        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3);
        g.addColorStop(0, `rgba(255,255,255,${alpha + glow})`);
        g.addColorStop(0.4, `rgba(245,245,247,${alpha * 0.5})`);
        g.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 2, 0, Math.PI * 2);
        ctx.fill();
      });

      if (assembleProgress > 0.85 || phase === 'idle') {
        ctx.shadowColor = 'rgba(255,255,255,0.25)';
        ctx.shadowBlur = 40 + glow * 120;
        ctx.globalCompositeOperation = 'lighter';
        particles.forEach((p) => {
          if (Math.hypot(p.x - p.tx, p.y - p.ty) < 4) {
            ctx.fillStyle = `rgba(255,255,255,${0.03 + glow})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.2, 0, Math.PI * 2);
            ctx.fill();
          }
        });
        ctx.shadowBlur = 0;
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    function drawMouseGlow() {
      if (!mouse.active || phase !== 'idle') return;
      const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, MOUSE_RADIUS);
      g.addColorStop(0, 'rgba(41,151,255,0.12)');
      g.addColorStop(0.5, 'rgba(41,151,255,0.04)');
      g.addColorStop(1, 'rgba(41,151,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, MOUSE_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    function loop(now) {
      drawBackground();
      updateParticles(now);
      drawParticles(now);
      drawMouseGlow();
      frameId = requestAnimationFrame(loop);
    }

    canvas.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });

    canvas.addEventListener('mouseleave', () => {
      mouse.active = false;
    });

    canvas.addEventListener('click', () => {
      if (phase === 'burst') return;
      phase = 'burst';
      burstStart = performance.now();
      statusEl.textContent = '重组中…';
      statusEl.classList.add('active');
      particles.forEach((p) => {
        p.vx = (Math.random() - 0.5) * 12;
        p.vy = (Math.random() - 0.5) * 12;
      });
    });

    window.addEventListener('resize', () => {
      cancelAnimationFrame(frameId);
      resize();
      frameId = requestAnimationFrame(loop);
    });

    resize();
    statusEl.textContent = '采样 Logo 轮廓…';
    requestAnimationFrame(() => {
      resetParticles(true);
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
